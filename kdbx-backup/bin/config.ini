# Central kdbx-backup configuration
# Watcher keys — kdbxWatch.exe reads these
WatchSourceDir=D:\KeePass\Databases
DestDir=D:\Tools\myutils\kdbx-backup\databaseCopies
HashAlgo=SHA256
DebounceSeconds=10
WatchLogFile=..\logs\watch.log

# Push keys — kdbxPushToRemote.exe reads these
PushSourceDir=..\databaseCopies
Remotes=Google,Dropbox,Koofr
RemotePath=kdbx-backup
PushLogFile=..\logs\rclone.log
